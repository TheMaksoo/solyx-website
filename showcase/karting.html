<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Karting Dashboard Demo | Solyx</title>
  <meta name="description" content="Interactive demo of the Solyx Karting Dashboard - lap time tracking and motorsport analytics.">
  <link rel="icon" type="image/png" href="/assets/SolyxIcon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0b0b0d; --surface:#17171c; --surface2:#121216; --border:#26262e;
      --accent:#e8452a; --accent2:rgba(232,69,42,.55); --text:#ecebef;
      --dim:#9a99a3; --faint:#5c5b64; --green:#4ade80; --amber:#f59e0b; --r:12px;
    }
    html { scroll-behavior:smooth; }
    body { font-family:"Manrope",system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    a { text-decoration:none; color:inherit; }
    h1,h2,h3 { font-family:"Space Grotesk",sans-serif; }

    /* NAV */
    .nav { position:sticky;top:0;z-index:100;background:rgba(11,11,13,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border); }
    .nav-inner { max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:20px;padding:0 32px;height:52px; }
    .nav-logo { display:flex;align-items:center;gap:9px; }
    .nav-logo img { height:26px;filter:drop-shadow(0 2px 6px rgba(232,69,42,.45)); }
    .nav-logo span { font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:16px;letter-spacing:3px; }
    .nav-links { display:flex;gap:22px;font-size:13px;font-weight:500;color:var(--dim); }
    .nav-links a:hover { color:var(--text); }
    .nav-links a.active { color:var(--text); }
    .nav-spacer { flex:1; }
    .nav-badge { font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;background:rgba(232,69,42,.15);border:1px solid rgba(232,69,42,.3);color:var(--accent); }

    /* LAYOUT */
    .shell { display:flex;height:100vh;overflow:hidden; }

    /* SIDEBAR */
    .sidebar { width:220px;flex-shrink:0;background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 0; }
    .sidebar-title { font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;padding:0 20px 12px; }
    .nav-item { display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:14px;color:var(--dim);cursor:pointer;transition:background .15s,color .15s;border-left:2px solid transparent; }
    .nav-item:hover { background:rgba(255,255,255,.03);color:var(--text); }
    .nav-item.active { color:var(--text);background:rgba(232,69,42,.08);border-left-color:var(--accent); }
    .nav-icon { width:16px;text-align:center;font-size:13px; }
    .sidebar-spacer { flex:1; }
    .driver-card { margin:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r); }
    .driver-avatar { width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#c0280a);display:flex;align-items:center;justify-content:center;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;color:#fff;margin-bottom:8px; }
    .driver-name { font-size:13px;font-weight:600; }
    .driver-role { font-size:11px;color:var(--faint);margin-top:2px; }

    /* MAIN */
    .main { flex:1;overflow-y:auto;padding:24px 28px; }
    .page-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:24px; }
    .page-title { font-size:22px;font-weight:700; }
    .page-sub { font-size:13px;color:var(--dim);margin-top:4px; }

    /* STAT CARDS */
    .stat-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px; }
    .stat-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px; }
    .stat-card-label { font-size:12px;color:var(--dim);margin-bottom:8px; }
    .stat-card-val { font-family:"Space Grotesk",sans-serif;font-size:26px;font-weight:700; }
    .stat-card-sub { font-size:11px;color:var(--faint);margin-top:4px; }
    .stat-card-badge { display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:6px; }
    .badge-green { background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.2); }
    .badge-amber { background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.2); }

    /* SESSIONS TABLE */
    .section-title { font-family:"Space Grotesk",sans-serif;font-size:16px;font-weight:600;margin-bottom:14px; }
    .table-wrap { background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:24px; }
    .table-head { display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 1fr 80px;padding:10px 18px;background:var(--surface2);border-bottom:1px solid var(--border); }
    .table-head span { font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--faint); }
    .table-row { display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 1fr 80px;padding:13px 18px;border-bottom:1px solid rgba(38,38,46,.6);align-items:center;transition:background .15s;cursor:pointer; }
    .table-row:last-child { border-bottom:none; }
    .table-row:hover { background:rgba(255,255,255,.025); }
    .row-track { font-size:14px;font-weight:600; }
    .row-sub { font-size:11px;color:var(--faint);margin-top:2px; }
    .row-time { font-family:"Space Grotesk",sans-serif;font-size:14px;font-weight:700; }
    .row-pos { display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:700; }
    .pos-1 { background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.25); }
    .pos-2 { background:rgba(148,163,184,.12);color:#94a3b8;border:1px solid rgba(148,163,184,.2); }
    .pos-3 { background:rgba(180,120,60,.12);color:#b47c3c;border:1px solid rgba(180,120,60,.2); }
    .pos-n { background:var(--surface2);color:var(--dim);border:1px solid var(--border); }
    .tag-pb { font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2); }

    /* LAP CHART */
    .two-col { display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:24px; }
    .card { background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px; }
    .chart-bars { display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:14px; }
    .bar-col { display:flex;flex-direction:column;align-items:center;gap:4px;flex:1; }
    .bar { width:100%;border-radius:3px 3px 0 0;transition:opacity .2s; }
    .bar:hover { opacity:.8; }
    .bar-label { font-size:9px;color:var(--faint); }

    /* LEADERBOARD */
    .lb-row { display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid rgba(38,38,46,.6);transition:background .15s;cursor:pointer; }
    .lb-row:last-child { border-bottom:none; }
    .lb-row:hover { background:rgba(255,255,255,.025); }
    .lb-rank { font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;width:22px;text-align:center; }
    .lb-driver-info { flex:1; }
    .lb-name { font-size:14px;font-weight:600; }
    .lb-track { font-size:11px;color:var(--faint); }
    .lb-time { font-family:"Space Grotesk",sans-serif;font-size:14px;font-weight:700;color:var(--accent); }

    /* FOOTER */
    .footer { height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--surface2);border-top:1px solid var(--border); }
    .footer-logo { display:flex;align-items:center;gap:8px; }
    .footer-logo img { height:20px;filter:drop-shadow(0 1px 4px rgba(232,69,42,.4)); }
    .footer-logo span { font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:12px;letter-spacing:3px; }
    .footer-links { display:flex;gap:16px; }
    .footer-links a { font-size:12px;color:var(--faint);transition:color .15s; }
    .footer-links a:hover { color:var(--accent); }
    .footer-links a.active { color:var(--dim); }
    .footer-copy { font-size:11px;color:#3a3840; }

    @media(max-width:900px) { .stat-grid{grid-template-columns:repeat(2,1fr)} .two-col{grid-template-columns:1fr} .sidebar{display:none} }
  </style>
</head>
<body>



</body>
</html>
